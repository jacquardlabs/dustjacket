name: major-tag

# Keep a moving major tag (e.g. v1) pointing at the latest vX.Y.Z release,
# so `uses: jacquardlabs/dustjacket@v1` resolves to the newest compatible action.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  retag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Move major tag
        run: |
          TAG="${{ github.event.release.tag_name }}"   # e.g. v1.2.0
          MAJOR="${TAG%%.*}"                            # v1
          git tag -f "$MAJOR" "$TAG"
          git push -f origin "$MAJOR"
